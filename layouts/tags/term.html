{{ define "main" }}
<section>
  {{ partial "components/title.html" . }}
  {{ .Content }}
  <div class="cards">
  {{ range .Pages }}
  {{ partial "components/post-card.html" ( dict
      "post" .
      "features" ( dict
          "smallCards" true
      )
  )}}
  {{ end }}
  </div>
</section>
{{ end }}
